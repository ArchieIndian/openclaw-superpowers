version: "1.0"
description: Deployment preflight results, environment summary, and rolling history.
fields:
  last_check_at:
    type: datetime
  deployment_root:
    type: string
  deployment_mode:
    type: enum
    values: [local, docker-compose, dockerfile, unknown]
  environment:
    type: object
    items:
      openclaw_home:         { type: string }
      workspace_dir:         { type: string }
      superpowers_path:      { type: string }
      openclaw_cli_found:    { type: boolean }
      pyyaml_found:          { type: boolean }
      docker_found:          { type: boolean }
      docker_compose_found:  { type: boolean }
      files_checked:         { type: integer, default: 0 }
  findings:
    type: list
    items:
      severity:    { type: enum, values: [FAIL, WARN, INFO] }
      check:       { type: string }
      detail:      { type: string }
      suggestion:  { type: string }
      file_path:   { type: string }
      detected_at: { type: datetime }
      resolved:    { type: boolean }
  check_history:
    type: list
    description: Rolling preflight summaries (last 12)
    items:
      checked_at:   { type: datetime }
      deployment_mode: { type: string }
      fail_count:   { type: integer }
      warn_count:   { type: integer }
      info_count:   { type: integer }
      files_checked: { type: integer }
