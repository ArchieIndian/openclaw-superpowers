name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'tests/**'
      - 'install.sh'
      - 'uninstall.sh'
      - 'README.md'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill structure
        run: ./scripts/validate-skills.sh

      - name: Check README metrics
        run: ./scripts/check-readme-metrics.sh

      - name: Run repository smoke tests
        run: bash ./tests/test-runner.sh
